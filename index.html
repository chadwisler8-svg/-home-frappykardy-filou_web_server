<!DOCTYPE html>
<html>
<head>
    <title>TARDIN-C2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Consolas', monospace; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        #sidebar { width: 220px; background: #000; border-right: 1px solid #00ff41; padding: 20px; box-shadow: 2px 0 10px rgba(0,255,65,0.2); }
        #main { flex: 1; display: flex; flex-direction: column; padding: 15px; }
        #chat { flex: 1; overflow-y: auto; background: #000; border: 1px solid #111; padding: 15px; border-radius: 5px; margin-bottom: 10px; box-shadow: inset 0 0 10px #000; }
        #chat::-webkit-scrollbar { width: 5px; }
        #chat::-webkit-scrollbar-thumb { background: #00ff41; }
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; width: calc(100% - 26px); outline: none; font-size: 14px; }
        button { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 10px; cursor: pointer; width: 100%; margin-bottom: 8px; text-transform: uppercase; font-size: 11px; transition: 0.3s; }
        button:hover { background: #00ff41; color: #000; }
        .log-line { margin: 1px 0; line-height: 1.4; white-space: pre-wrap; }
        .cmd-echo { color: #fff; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2 style="font-size: 16px; text-align: center;">TARDIN-C2</h2>
        <hr style="border: 0.5px solid #00ff41; margin-bottom: 20px;">
        <button onclick="send('tardinamite bell.ca')">🧨 FULL RECON</button>
        <button onclick="send('nmap 192.168.1.1')">🔍 QUICK SCAN</button>
        <button onclick="send('phish')">🎣 PHISHING</button>
        <button onclick="document.getElementById('chat').innerHTML = ''">🧹 CLEAR LOGS</button>
    </div>
    <div id="main">
        <div id="chat"></div>
        <input id="input" placeholder="Entrer commande..." onkeypress="if(event.keyCode==13) { send(this.value); this.value=''; }">
    </div>
    <script>
        var socket = io();
        function send(val) {
            socket.emit('command', {data: val});
            document.getElementById('chat').innerHTML += "<div class='cmd-echo'>> " + val + "</div>";
        }
        socket.on('logs', function(msg) {
            let chat = document.getElementById('chat');
            chat.innerHTML += "<div class='log-line'>" + msg.data + "</div>";
            chat.scrollTop = chat.scrollHeight;
        });
    </script>
</body>
</html>
